<title>7DG 2026 — 3D Spin</title>
<style>
  html,body{margin:0;height:100%;background:transparent;}
  body{display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .stage{perspective:1600px;padding:20px;box-sizing:border-box;transform:scale(0.75);}
  .spin{position:relative;width:600px;height:381px;transform-style:preserve-3d;
        animation:spinY 9s linear infinite;}
  @keyframes spinY{from{transform:rotateX(-12deg) rotateY(0deg);}to{transform:rotateX(-12deg) rotateY(360deg);}}
